version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    volumes: []
    environment:
      DATABASE_URL: postgresql://mint_user:mint_pass@postgres:5432/mint_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ENVIRONMENT: production
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
    command: []

  celery_worker:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    volumes: []
    environment:
      DATABASE_URL: postgresql://mint_user:mint_pass@postgres:5432/mint_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
    command: celery -A app.core.celery_app worker --loglevel=info

  jaeger:
    restart: unless-stopped
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  celery_beat:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    volumes: []
    environment:
      DATABASE_URL: postgresql://mint_user:mint_pass@postgres:5432/mint_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: celery -A app.core.celery_app beat --loglevel=info

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "80:80"
    volumes: []
    environment: []
    command: []
