name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SECRET_KEY,VITE_API_URL,BACKEND_CORS_ORIGINS,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,SMTP_FROM,OPENAI_API_KEY
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi
            if [ ! -d ~/mint ]; then
              git clone https://github.com/${{ github.repository }}.git ~/mint
            fi
            cd ~/mint
            git pull origin main
            SECRET_KEY=$SECRET_KEY \
            VITE_API_URL=$VITE_API_URL \
            BACKEND_CORS_ORIGINS=$BACKEND_CORS_ORIGINS \
            SMTP_HOST=$SMTP_HOST \
            SMTP_PORT=$SMTP_PORT \
            SMTP_USER=$SMTP_USER \
            SMTP_PASSWORD=$SMTP_PASSWORD \
            SMTP_FROM=$SMTP_FROM \
            OPENAI_API_KEY=$OPENAI_API_KEY \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend alembic upgrade head
            echo "Deploy complete"
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
